name: Auto Update ZZZ Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Puppeteer and Stealth dependencies
      run: |
        npm init -y
        npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

    - name: Run Node.js Puppeteer Scraper
      run: node scraper.js

    - name: Commit and Push changes
      run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            
            git add characters.json characters/
            
            if git diff --cached --quiet; then
              echo "No changes detected. Skipping commit."
            else
              VERSION=$(node -e "const fs=require('fs'); const m=fs.readFileSync('scraper.js','utf8').match(/const SCRAPER_VERSION\s*=\s*['\"]([^'\"]+)['\"]/); console.log(m?m[1]:'1.0.0');")
              CURRENT_DATE=$(date +'%m.%d.%y')
              
              git commit -m "db: automated update of characters and data [$CURRENT_DATE]" -m "Scraper Version: $VERSION"
              git push origin main
            fi
